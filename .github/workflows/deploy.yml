name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch: {}   # allow manual/agent-triggered redeploys (e.g. after fixing VERCEL_TOKEN)

jobs:
  deploy-frontend:
    name: Deploy Frontend (Vercel)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g vercel
      # Single-step deploy: with VERCEL_ORG_ID + VERCEL_PROJECT_ID set the CLI
      # links the project itself and Vercel builds remotely — avoids the
      # local pull/build project-settings dance that broke with newer CLIs.
      - name: Deploy
        run: vercel deploy --prod --yes --token=${{ secrets.VERCEL_TOKEN }}
        working-directory: web
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-backend:
    name: Deploy Backend (Railway)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        run: railway up --service 12bf5817-2172-48d4-bd18-b9d33cada34a --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
