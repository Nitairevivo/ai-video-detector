name: EAS Android Build

on:
  workflow_dispatch:
    inputs:
      expo_token:
        description: 'Expo personal access token'
        required: true

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: claude/video-ai-detection-readability-41mpza

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install dependencies
        run: npm install
        working-directory: mobile

      - name: Setup EAS
        run: npm install -g eas-cli

      - name: Build APK
        run: eas build --profile preview --platform android --non-interactive
        working-directory: mobile
        env:
          EXPO_TOKEN: ${{ github.event.inputs.expo_token }}
