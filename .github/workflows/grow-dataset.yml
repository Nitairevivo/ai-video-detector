name: Grow dataset + retrain (autonomous)

# Runs every day, accumulating the training set toward a large, diverse corpus
# and retraining the model — no laptop, no manual step. Only FEATURE VECTORS are
# stored (data/training_samples.json), so the set can grow to tens of thousands
# of samples without terabytes of disk.
#
# Sources (all reachable from CI):
#   • real: Pexels (needs PEXELS_API_KEY secret) + archive.org + Wikimedia
#   • AI + real: Hugging Face video datasets — set repo variables
#       HF_AI_REPOS   = comma-separated dataset ids of GENERATED videos
#       HF_REAL_REPOS = comma-separated dataset ids of REAL videos
#     (Settings → Secrets and variables → Actions → Variables). yt-dlp is NOT
#     used here — it is blocked on datacenter IPs. AI videos from your phone go
#     in via the app / benchmark_local.py on a residential IP.
#
# The accumulated dataset + model live on the `auto-train` branch. Review the
# metrics in the job summary, then merge auto-train into master when happy.

on:
  schedule:
    - cron: "0 2 * * *"    # every day 02:00 UTC
  workflow_dispatch:
    inputs:
      per_repo_limit:
        description: "Max videos to pull per HF repo this run"
        default: "400"

permissions:
  contents: write

concurrency:
  group: grow-dataset
  cancel-in-progress: false

jobs:
  grow:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Restore accumulated dataset from auto-train
        run: |
          git config user.name "verifai-trainer"
          git config user.email "trainer@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin auto-train >/dev/null 2>&1; then
            git fetch origin auto-train
            # Bring over the growing dataset + model ARTIFACTS only — never code.
            # Restoring all of models/ would clobber master's classifier.py with
            # the branch's stale copy, so training would silently run old code
            # (this is exactly what hid the calibration fix). List files explicitly.
            git checkout origin/auto-train -- \
              data/training_samples.json data/seen_video_ids.json \
              models/trained_model.joblib models/trained_model_meta.json \
              models/frame_model.pkl 2>/dev/null || true
            echo "Restored dataset + model artifacts from auto-train (code kept from master)."
          else
            echo "No auto-train yet — starting from master's dataset."
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ffmpeg + deps
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          pip install -r requirements.txt

      - name: Collect from Hugging Face video datasets
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          LIMIT: ${{ github.event.inputs.per_repo_limit || '400' }}
          # Verified default sources used when the repo VARIABLES are unset, so
          # collection never silently no-ops. deepaction_v1 is path-verified AI
          # (2,505 clips across 6 generators; ~900 still un-ingested). Real keeps
          # flowing from the key-free archive.org/Wikimedia step below and
          # auto-unlocks as the AI class grows (the real cap is 3x AI).
          DEFAULT_AI_REPOS: "faridlab/deepaction_v1"
          DEFAULT_REAL_REPOS: ""
        run: |
          # Repo lists come from GitHub Actions VARIABLES, but if they were
          # never set the collector iterates NOTHING and the dataset flatlines
          # (exactly what happened). Fall back to a curated, verified default so
          # videos always flow in without any manual setup.
          AI_REPOS="${{ vars.HF_AI_REPOS }}"
          [ -z "$AI_REPOS" ] && AI_REPOS="$DEFAULT_AI_REPOS"
          REAL_REPOS="${{ vars.HF_REAL_REPOS }}"
          [ -z "$REAL_REPOS" ] && REAL_REPOS="$DEFAULT_REAL_REPOS"
          echo "AI repos:   $AI_REPOS"
          echo "REAL repos: $REAL_REPOS"
          IFS=',' read -ra AI <<< "$AI_REPOS"
          for r in "${AI[@]}"; do
            r=$(echo "$r" | xargs)
            [ -z "$r" ] && continue
            echo "::group::AI repo $r"
            python training/collect_hf.py --repo "$r" --label ai --limit "$LIMIT" --auto-label || true
            echo "::endgroup::"
          done
          IFS=',' read -ra RE <<< "$REAL_REPOS"
          for r in "${RE[@]}"; do
            r=$(echo "$r" | xargs)
            [ -z "$r" ] && continue
            echo "::group::real repo $r"
            python training/collect_hf.py --repo "$r" --label real --limit "$LIMIT" || true
            echo "::endgroup::"
          done

      - name: Grow REAL class from key-free CI sources (archive.org + Wikimedia)
        run: |
          python training/collect_freesources.py --per-query 12 || true

      - name: Supplement real class from free stock sources + retrain
        env:
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          VERIFAI_DATASET_DIR: ${{ runner.temp }}/dataset
        run: |
          python train_forever.py --rounds 6 --batch 20 || true

      - name: Job summary
        if: always()
        run: |
          {
            echo "## Dataset growth"
            python - <<'EOF'
          import json, os
          try:
              meta = json.load(open("models/trained_model_meta.json"))
              print(f"- Samples: **{meta.get('samples','?')}** ({meta.get('ai_samples','?')} AI / {meta.get('real_samples','?')} real)")
              for k in ("cv_auc_mean","cv_precision","cv_recall","cv_fpr","cv_brier"):
                  if meta.get(k) is not None:
                      print(f"- {k}: **{meta[k]:.4f}**")
          except Exception as e:
              print(f"- (no metrics: {e})")
          # Hard-sample mining: which generators the model is weakest on.
          try:
              rep = json.load(open("data/hard_samples_report.json"))
              rows = sorted(rep.get("repos", {}).items(), key=lambda kv: -kv[1].get("hard_rate", 0))
              if rows:
                  print("\n### Hard-sample rate by source (higher = model's blind spots)")
                  print("| source | class | added | hard | hard-rate |")
                  print("|---|---|---|---|---|")
                  for name, r in rows:
                      print(f"| {name} | {r['class']} | {r['added']} | {r['hard']} | **{r['hard_rate']*100:.0f}%** |")
          except Exception:
              pass
          EOF
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit accumulated dataset + model to auto-train
        if: always()
        run: |
          git checkout -B auto-train
          # Artifacts + data only — keep code (classifier.py) out of the branch.
          git add data/training_samples.json data/seen_video_ids.json \
                  data/hard_samples_report.json \
                  models/trained_model.joblib models/trained_model_meta.json \
                  models/frame_model.pkl 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No change to commit."
          else
            git commit -m "Grow dataset + retrain ($(date -u +%Y-%m-%d))"
            git push -f origin auto-train
          fi
