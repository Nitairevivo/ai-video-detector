name: Ingest a verified benchmark (un-starve the AI class)

# Pulls a VETTED multi-generator benchmark (verified first with quarantine-scan)
# into the training set: classify each file by path, extract the code-first
# feature vector, drop the video, retrain, and commit to auto-train. Because
# collect_auto respects the real-saturation cap, when real already dwarfs AI it
# pulls ONLY the AI half — which is the whole point: grow the starved AI class.

on:
  workflow_dispatch:
    inputs:
      repo:
        description: "Verified HF dataset id to ingest"
        required: true
        default: "faridlab/deepaction_v1"
      limit:
        description: "Max NEW labeled videos to pull this run"
        required: false
        default: "1000"

permissions:
  contents: write

concurrency:
  group: grow-dataset          # share the lock with grow-dataset (same dataset files)
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4
        with: { ref: master, fetch-depth: 0 }

      - name: Restore accumulated dataset from auto-train
        run: |
          git config user.name "verifai-trainer"
          git config user.email "trainer@users.noreply.github.com"
          if git ls-remote --exit-code --heads origin auto-train >/dev/null 2>&1; then
            git fetch origin auto-train
            git checkout origin/auto-train -- \
              data/training_samples.json data/seen_video_ids.json \
              data/hard_samples_report.json \
              models/trained_model.joblib models/trained_model_meta.json \
              models/frame_model.pkl 2>/dev/null || true
            echo "Restored dataset + model artifacts from auto-train."
          fi

      - uses: actions/setup-python@v5
        with: { python-version: "3.11", cache: pip }

      - name: Install ffmpeg + deps
        run: |
          sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
          pip install -r requirements.txt

      - name: Ingest the benchmark (auto-label, AI only while real-saturated)
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python training/collect_hf.py --repo "${{ github.event.inputs.repo }}" \
            --auto-label --limit "${{ github.event.inputs.limit || '1000' }}"

      - name: Job summary — new balance + metrics
        if: always()
        run: |
          {
            echo "## Ingest result"
            python - <<'EOF'
          import json
          try:
              m = json.load(open("models/trained_model_meta.json"))
              print(f"- Samples: **{m.get('samples','?')}** "
                    f"({m.get('ai_samples','?')} AI / {m.get('real_samples','?')} real)")
              for k in ("cv_auc_mean","cv_precision","cv_recall","cv_fpr"):
                  if m.get(k) is not None:
                      print(f"- {k}: **{m[k]:.4f}**")
          except Exception as e:
              print(f"- (no metrics: {e})")
          EOF
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit accumulated dataset + model to auto-train
        if: always()
        run: |
          git checkout -B auto-train
          # The restore step stages files into the index; reset it to HEAD so the
          # index reflects ONLY what changed in the working tree (the +AI samples
          # + retrained model). Without this the later add/diff saw a clean index
          # and silently committed nothing.
          git reset -q
          git add -f data/training_samples.json data/seen_video_ids.json \
                  data/hard_samples_report.json \
                  models/trained_model.joblib models/trained_model_meta.json \
                  models/frame_model.pkl || true
          echo "Staged changes:"; git status --porcelain
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Ingest ${{ github.event.inputs.repo }}: grow AI class ($(date -u +%Y-%m-%d))"
            git push -f origin auto-train
            echo "Committed + pushed to auto-train."
          else
            echo "No change to commit."
          fi
