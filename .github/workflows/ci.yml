name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install ffmpeg
        run: sudo apt-get update -q && sudo apt-get install -y -q ffmpeg
      - name: Install dependencies
        run: pip install -r requirements.txt pytest httpx
      - name: Run tests
        env:
          DB_PATH: ${{ runner.temp }}/aivd.db
        run: python -m pytest tests/ -q
      - name: Import smoke test (server + bots load)
        env:
          DB_PATH: ${{ runner.temp }}/aivd.db
        run: |
          python - <<'EOF'
          from api.server import app, run_full_analysis, download_video_from_url
          from api import telegram_bot
          from models.classifier import get_classifier
          c = get_classifier()
          assert c.is_trained, "committed model fails its own quality gate"
          print("imports + model quality gate OK")
          EOF

  web-build:
    name: Web production build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        working-directory: web
        run: npm ci || npm install --no-audit --no-fund
      - name: Build
        working-directory: web
        run: npx next build

  mobile-syntax:
    name: Mobile syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: esbuild parse App + services
        run: |
          npx --yes esbuild mobile/App.tsx --loader:.tsx=tsx --outfile=/dev/null
          for f in mobile/services/*.ts mobile/hooks/*.ts; do
            npx --yes esbuild "$f" --outfile=/dev/null
          done
